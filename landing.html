<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0e17" />
  <title>სიტყვობანა</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wdth,wght@87.5,300;87.5,400;87.5,500;87.5,700;87.5,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #0f0e17;
      --surface:#1e1e3a;
      --border: #3a3a5c;
      --text:   #fffffe;
      --dim:    #a7a9be;
      --muted:  #666680;
      --gold:   #e8c547;
      --gold2:  #c9963a;
      --green:  #2dc653;
      --yellow: #c9963a;
      --radius: 6px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans Georgian', sans-serif;
      font-weight: 400;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      position: relative;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(232,197,71,.07) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 50%, rgba(45,198,83,.04) 0%, transparent 55%);
    }
    .logo {
      font-family: 'Noto Sans Georgian', sans-serif;
      font-weight: 900;
      font-variation-settings: 'wdth' 87.5;
      font-size: clamp(44px, 11vw, 80px);
      color: var(--gold);
      letter-spacing: 4px;
      line-height: 1;
      text-align: center;
      opacity: 0;
      animation: fadeUp .7s .1s ease forwards;
    }
    .divider {
      width: 40px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold2), transparent);
      margin: 24px auto;
      opacity: 0;
      animation: fadeUp .7s .35s ease forwards;
    }
    .tagline {
      font-family: 'Noto Sans Georgian', sans-serif;
      font-weight: 300;
      font-size: clamp(13px, 3vw, 16px);
      color: var(--dim);
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp .7s .45s ease forwards;
    }
    .tiles {
      display: flex;
      gap: 7px;
      margin: 28px auto 0;
      opacity: 0;
      animation: fadeUp .6s .6s ease forwards;
    }
    .tile {
      width: 44px; height: 44px;
      border-radius: 5px;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Noto Sans Georgian', sans-serif;
      font-size: 20px; font-weight: 700;
      color: var(--text);
      animation: tileFlip .45s ease both;
    }
    .tile:nth-child(1) { animation-delay: .75s; }
    .tile:nth-child(2) { animation-delay: .9s;  background: var(--green);  border-color: var(--green);  color: #fff; }
    .tile:nth-child(3) { animation-delay: 1.05s; }
    .tile:nth-child(4) { animation-delay: 1.2s; background: var(--yellow); border-color: var(--yellow); color: #fff; }
    .tile:nth-child(5) { animation-delay: 1.35s; }
    @keyframes tileFlip {
      from { transform: rotateX(-90deg); opacity: 0; }
      to   { transform: rotateX(0);      opacity: 1; }
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 300px;
      margin-top: 32px;
      opacity: 0;
      animation: fadeUp .6s 1.5s ease forwards;
    }
    .btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 14px 20px;
      border-radius: var(--radius);
      font-family: 'Noto Sans Georgian', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; transition: all .2s;
      text-decoration: none; border: none;
    }
    .btn-play {
      background: var(--gold);
      color: #0f0e17;
      position: relative; overflow: hidden;
    }
    .btn-play::after {
      content: ''; position: absolute; inset: 0;
      background: #f0d060;
      transform: translateX(-101%);
      transition: transform .25s ease;
    }
    .btn-play:hover::after { transform: translateX(0); }
    .btn-play span { position: relative; z-index: 1; }
    .btn-login {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-login:hover { border-color: var(--gold); color: var(--gold); }
    .btn-subscribe {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 11px; letter-spacing: 1px;
      padding: 8px;
    }
    .btn-subscribe:hover { color: var(--dim); }
    .subscribe-wrap {
      width: 100%; max-width: 300px;
      display: none;
      opacity: 0;
      animation: fadeUp .3s ease forwards;
      margin-top: 32px;
    }
    .subscribe-wrap.open { display: block; }
    .sub-row {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s;
    }
    .sub-row:focus-within { border-color: var(--gold); }
    .sub-input {
      flex: 1; padding: 12px 14px;
      background: var(--surface);
      border: none; outline: none;
      font-family: 'Noto Sans Georgian', sans-serif;
      font-size: 13px; color: var(--text);
    }
    .sub-input::placeholder { color: var(--muted); }
    .sub-btn {
      padding: 12px 14px;
      background: var(--gold); border: none;
      font-family: 'Noto Sans Georgian', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: #0f0e17; cursor: pointer;
      transition: background .2s; white-space: nowrap;
    }
    .sub-btn:hover { background: #f0d060; }
    .sub-ok {
      display: none;
      text-align: center; color: var(--green);
      font-size: 13px; padding: 12px;
      letter-spacing: .5px;
    }
    .sub-note {
      text-align: center; font-size: 10px;
      color: var(--muted); margin-top: 8px; letter-spacing: .5px;
    }
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 24px calc(12px + env(safe-area-inset-bottom));
      display: flex; align-items: center; justify-content: center;
      gap: 16px;
      font-size: 10px; color: var(--muted); letter-spacing: .5px;
      border-top: 1px solid rgba(58,58,92,.5);
      background: var(--bg);
      opacity: 0;
      animation: fadeUp .5s 1.8s ease forwards;
    }
    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { color: var(--gold); }
    .footer-dot { color: var(--border); }
    #toast {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: var(--text); color: var(--bg);
      padding: 9px 18px; border-radius: 20px;
      font-size: 12px; font-weight: 700; letter-spacing: .5px;
      opacity: 0; transition: all .25s; pointer-events: none;
      white-space: nowrap; max-width: 90vw; text-align: center;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    body.sub-open .buttons { display: none; }
    body.sub-open .subscribe-wrap { display: block; }
    @media (max-height: 600px) {
      .logo { font-size: 40px; }
      .divider { margin: 14px auto; }
      .tiles { margin-top: 16px; }
      .buttons, .subscribe-wrap { margin-top: 20px; }
      .tile { width: 36px; height: 36px; font-size: 17px; }
    }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="logo">სიტყვობანა</div>
<div class="divider"></div>
<p class="tagline">გამოიცანი დამალული ქართული სიტყვა ექვს მცდელობაში — ყოველდღე ახალი გამოწვევა.</p>

<div class="tiles">
  <div class="tile">ს</div>
  <div class="tile">ხ</div>
  <div class="tile">ი</div>
  <div class="tile">ვ</div>
  <div class="tile">ი</div>
</div>

<div class="buttons">
  <a href="index.html" class="btn btn-play"><span>▶ &nbsp;ითამაშე</span></a>
  <a href="index.html?freeplay=1" class="btn btn-login" style="border-color:rgba(232,197,71,.3);color:var(--gold)">🎮 &nbsp;თავისუფალი თამაში</a>
  <a href="#" class="btn btn-login" onclick="showLogin(event)">შესვლა</a>
  <button class="btn btn-subscribe" onclick="openSubscribe()">✉ &nbsp;გამოიწერე</button>
</div>

<div class="subscribe-wrap" id="sub-wrap">
  <div class="sub-row" id="sub-form">
    <input class="sub-input" type="email" id="sub-email" placeholder="შენი@ელფოსტა.com" />
    <button class="sub-btn" onclick="handleSubscribe()">გაგზავნა</button>
  </div>
  <p class="sub-ok" id="sub-ok">✓ გამოწერილია! ხვალ გელოდებით.</p>
  <p class="sub-note">სპამი არ გამოვაგზავნით · გამოწერის გაუქმება ნებისმიერ დროს</p>
  <button class="btn btn-subscribe" style="margin-top:6px" onclick="closeSubscribe()">← უკან</button>
</div>

<div class="footer">
  <a href="#">როგორ ვითამაშოთ</a>
  <span class="footer-dot">·</span>
  <a href="mailto:hello@sitqva.ge">კონტაქტი</a>
  <span class="footer-dot">·</span>
  <span>© 2025 სიტყვობანა</span>
</div>

<script>
function openSubscribe() {
  document.body.classList.add('sub-open');
  setTimeout(() => document.getElementById('sub-email').focus(), 50);
}
function closeSubscribe() {
  document.body.classList.remove('sub-open');
}
function handleSubscribe() {
  const email = document.getElementById('sub-email').value.trim();
  if (!email || !email.includes('@')) { showToast('გთხოვთ შეიყვანოთ სწორი ელ-ფოსტა'); return; }
  const list = JSON.parse(localStorage.getItem('sitqva_subs') || '[]');
  list.push({ email, date: new Date().toISOString() });
  localStorage.setItem('sitqva_subs', JSON.stringify(list));
  document.getElementById('sub-form').style.display = 'none';
  document.getElementById('sub-ok').style.display = 'block';
}
document.getElementById('sub-email').addEventListener('keydown', e => { if (e.key === 'Enter') handleSubscribe(); });
function showLogin(e) {
  e.preventDefault();
  showToast('შესვლა მალე დაემატება — ახლა სტუმრად ითამაშე');
}
let tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
