<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0e17" />
  <title>ლიდერბორდი — სიტყვობანა</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232dc653'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='20' fill='%23ffffff'%3Eს%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wdth,wght@87.5,300;87.5,400;87.5,500;87.5,700;87.5,900&display=swap" rel="stylesheet">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZYRDVJSMHE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZYRDVJSMHE');
  </script>
  <style>
    :root {
      --bg:      #0f0e17;
      --surface: #1a1a2e;
      --surface2:#1e1e3a;
      --border:  #2a2a4a;
      --text:    #fffffe;
      --dim:     #a7a9be;
      --muted:   #666680;
      --gold:    #e8c547;
      --gold2:   #c9963a;
      --green:   #2dc653;
      --accent:  #63b3ed;
      --radius:  8px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans Georgian', sans-serif;
      font-weight: 400;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo {
      font-weight: 900;
      font-size: 16px;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 1px;
      font-variation-settings: 'wdth' 87.5;
    }
    .header-logo span { color: var(--green); }
    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-family: 'Noto Sans Georgian', sans-serif;
      cursor: pointer;
      transition: all .2s;
    }
    .back-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 6px;
      padding: 16px 16px 0;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }
    .tab {
      flex: 1;
      padding: 9px 6px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--dim);
      font-size: 11px;
      font-weight: 700;
      font-family: 'Noto Sans Georgian', sans-serif;
      letter-spacing: .5px;
      cursor: pointer;
      text-align: center;
      transition: all .2s;
    }
    .tab.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #0f0e17;
    }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── PERIOD FILTER ── */
    .period-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    .period-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-family: 'Noto Sans Georgian', sans-serif;
      cursor: pointer;
      transition: all .2s;
    }
    .period-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(99,179,237,.1);
    }

    /* ── LEADERBOARD TABLE ── */
    .board {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .board-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      transition: border-color .2s;
    }
    .board-row:hover { border-color: var(--border); }
    .board-row.top-1 { border-color: var(--gold); background: rgba(232,197,71,.08); }
    .board-row.top-2 { border-color: #b0b0b0; background: rgba(176,176,176,.06); }
    .board-row.top-3 { border-color: #cd7f32; background: rgba(205,127,50,.06); }
    .rank {
      font-size: 18px;
      min-width: 32px;
      text-align: center;
    }
    .player-info { flex: 1; }
    .player-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .player-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .player-score {
      text-align: right;
    }
    .score-num {
      font-size: 20px;
      font-weight: 900;
      color: var(--gold);
      font-variation-settings: 'wdth' 87.5;
    }
    .score-label {
      font-size: 10px;
      color: var(--muted);
    }

    /* ── YOUR RANK ── */
    .your-rank {
      margin-top: 16px;
      padding: 12px 14px;
      background: rgba(99,179,237,.08);
      border: 1px solid rgba(99,179,237,.3);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .your-rank .rank { color: var(--accent); }
    .your-rank .player-name { color: var(--accent); }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 8px;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed; top: 12px; left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--text); color: var(--bg);
      padding: 8px 16px; border-radius: 20px;
      font-weight: 600; font-size: 13px;
      z-index: 1000; opacity: 0; transition: all .25s;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="toast"></div>

<header>
  <a href="index.html" class="header-logo" style="text-decoration:none;display:flex;align-items:center;gap:6px;font-weight:700;font-size:16px;color:var(--text);"><span style="display:inline-flex;align-items:center;justify-content:center;background:#2dc653;color:#fff;width:22px;height:22px;border-radius:4px;font-size:14px;font-weight:900;">ს</span>იტყვობანა</a>
  <div style="display:flex;gap:8px;align-items:center;">
    <button id="login-btn" onclick="signInWithPopup(auth, new GoogleAuthProvider()).then(()=>showToast('კეთილი იყოს 👋')).catch(e=>showToast(e.message))" class="back-btn" style="border-color:rgba(99,179,237,.4);color:var(--accent);">🔑 შესვლა</button>
    <div id="user-info" style="display:none;align-items:center;gap:6px;">
      <span class="user-name" style="font-size:13px;font-weight:700;color:var(--green);"></span>
      <button onclick="getAuth(app).signOut()" class="back-btn">გამოსვლა</button>
    </div>
    <button class="back-btn" onclick="history.back()">← უკან</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('daily', this)">📅 დღის სიტყვა</div>
  <div class="tab" onclick="switchTab('freeplay', this)">🎮 თავისუფალი</div>
  <div class="tab" onclick="switchTab('speed', this)">⚡ სიჩქარე</div>
  <div class="tab" onclick="switchTab('accuracy', this)">🎯 სიზუსტე</div>
</div>

<div class="content">
  <div class="period-bar">
    <button class="period-btn active" onclick="setPeriod('today', this)">დღეს</button>
    <button class="period-btn" onclick="setPeriod('week', this)">კვირა</button>
    <button class="period-btn" onclick="setPeriod('alltime', this)">ყველა დრო</button>
  </div>

  <div id="board-container">
    <div class="loading">
      <div class="spinner"></div><br>იტვირთება...
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, query, orderByChild, limitToLast, get, onValue }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const app = initializeApp({
  apiKey:"AIzaSyDUwQUWDHXtHtxRq6RcZcbId3z-kzrAwwY",
  authDomain:"sityvobana-2a717.firebaseapp.com",
  databaseURL:"https://sityvobana-2a717-default-rtdb.firebaseio.com",
  projectId:"sityvobana-2a717",
  storageBucket:"sityvobana-2a717.firebasestorage.app",
  messagingSenderId:"654904298229",
  appId:"1:654904298229:web:6d6e54a5681edd5975d3bc"
});
const db = getDatabase(app);
const auth = getAuth(app);
let currentUser = null;
onAuthStateChanged(auth, u => { currentUser = u; updateAuthUI(); });

let currentTab = 'daily';
let currentPeriod = 'today';

const MEDALS = ['🥇','🥈','🥉'];
const RANK_CLASSES = ['top-1','top-2','top-3'];

function getPlayerName() {
  if(currentUser) return currentUser.displayName || currentUser.email.split('@')[0];
  return localStorage.getItem('sitqva_challenger_name') || null;
}

function getPlayerUid() {
  return currentUser ? currentUser.uid : null;
}

function updateAuthUI() {
  const loginBtn = document.getElementById('login-btn');
  const userInfo = document.getElementById('user-info');
  if(!loginBtn) return;
  if(currentUser) {
    const name = currentUser.displayName || currentUser.email.split('@')[0];
    loginBtn.style.display = 'none';
    userInfo.style.display = 'flex';
    userInfo.querySelector('.user-name').textContent = name;
  } else {
    loginBtn.style.display = 'flex';
    userInfo.style.display = 'none';
  }
}

// Get today's date string
function todayStr() {
  return new Date().toISOString().slice(0,10);
}

// Get date N days ago
function daysAgoStr(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0,10);
}

async function loadScores() {
  const container = document.getElementById('board-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>იტვირთება...</div>';

  try {
    const path = `leaderboard/${currentTab}`;
    const snap = await get(ref(db, path));

    if(!snap.exists()) {
      showEmpty();
      return;
    }

    let entries = Object.entries(snap.val()).map(([id, v]) => ({id, ...v}));

    // Filter by period
    if(currentPeriod === 'today') {
      entries = entries.filter(e => e.date === todayStr());
    } else if(currentPeriod === 'week') {
      const weekAgo = daysAgoStr(7);
      entries = entries.filter(e => e.date >= weekAgo);
    }

    if(entries.length === 0) { showEmpty(); return; }

    // Sort by score (higher = better) or guesses (lower = better for daily)
    if(currentTab === 'daily') {
      entries.sort((a,b) => (a.guesses||99) - (b.guesses||99) || (a.time||999) - (b.time||999));
    } else {
      entries.sort((a,b) => (b.score||0) - (a.score||0));
    }

    // Deduplicate by player name — keep best score
    const seen = {};
    entries = entries.filter(e => {
      const key = e.name || 'anonymous';
      if(seen[key]) return false;
      seen[key] = true;
      return true;
    });

    renderBoard(entries.slice(0, 50));

  } catch(e) {
    console.error(e);
    showEmpty('კავშირის შეცდომა');
  }
}

function renderBoard(entries) {
  const myName = getPlayerName();
  const container = document.getElementById('board-container');

  if(entries.length === 0) { showEmpty(); return; }

  const myUid = getPlayerUid();
  let myRank = -1;
  const rows = entries.map((e, i) => {
    const rank = i + 1;
    const name = e.name || 'ანონიმი';
    const isMe = myUid ? e.uid === myUid : (myName && name === myName);
    if(isMe) myRank = rank;

    const medal = MEDALS[i] || `${rank}.`;
    const rankClass = RANK_CLASSES[i] || '';

    let scoreHtml = '';
    if(currentTab === 'daily') {
      scoreHtml = `<div class="score-num">${e.guesses || '?'}</div><div class="score-label">მცდელობა</div>`;
    } else {
      scoreHtml = `<div class="score-num">${e.score || 0}</div><div class="score-label">ქულა</div>`;
    }

    let sub = '';
    if(e.date) sub = e.date;
    if(e.time) sub += sub ? ` · ${formatTime(e.time)}` : formatTime(e.time);

    return `<div class="board-row ${rankClass}${isMe?' your-rank':''}">
      <div class="rank">${medal}</div>
      <div class="player-info">
        <div class="player-name">${name}${isMe ? ' 👈' : ''}</div>
        ${sub ? `<div class="player-sub">${sub}</div>` : ''}
      </div>
      <div class="player-score">${scoreHtml}</div>
    </div>`;
  }).join('');

  container.innerHTML = `<div class="board">${rows}</div>`;
}

function formatTime(seconds) {
  if(!seconds) return '';
  const m = Math.floor(seconds/60);
  const s = seconds % 60;
  return m > 0 ? `${m}წ ${s}წმ` : `${s}წმ`;
}

function showEmpty(msg) {
  const labels = {
    daily: 'დღის სიტყვის',
    freeplay: 'თავისუფალი თამაშის',
    speed: 'სიჩქარის',
    accuracy: 'სიზუსტის'
  };
  document.getElementById('board-container').innerHTML = `
    <div class="empty">
      <div class="empty-icon">🏆</div>
      ${msg || `${labels[currentTab]||''} შედეგები ჯერ არ არის`}<br>
      <span style="font-size:11px;margin-top:6px;display:block">იყავი პირველი!</span>
    </div>`;
}

// ── GLOBAL FUNCTIONS ──
window.switchTab = function(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadScores();
};

window.setPeriod = function(period, el) {
  currentPeriod = period;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadScores();
};

// Initial load
loadScores();
</script>

<script>
let tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
